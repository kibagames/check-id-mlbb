<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cek ID Akun Mobile Legends</title>
  <meta name="description" content="Cek Username dan Region Akun Mobile Legends lewat ID">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="./css/output.css">
</head>
<body>
  <!-- Letterbox bars -->
  <div class="letterbox-top"></div>
  <div class="letterbox-bottom"></div>

  <!-- Floating dust particles -->
  <div class="particles" id="particles"></div>

  <main class="main-container">
    <div class="content-wrapper">

      <!-- Language Toggle -->
      <div class="lang-toggle-wrapper fade-in" id="lang-toggle-wrapper">
        <button class="lang-toggle" id="lang-toggle" title="Switch Language">
          <span class="lang-flag" id="lang-flag">🇮🇩</span>
          <span class="lang-code" id="lang-code">ID</span>
          <i data-lucide="chevron-down" class="icon-xs lang-chevron"></i>
        </button>
        <div class="lang-dropdown" id="lang-dropdown">
          <button class="lang-option" data-lang="id">
            <span>🇮🇩</span>
            <span>Indonesia</span>
          </button>
          <button class="lang-option" data-lang="en">
            <span>🇬🇧</span>
            <span>English</span>
          </button>
        </div>
      </div>

      <!-- GitHub Repo Badge -->
      <a href="https://github.com/cabrata/check-id-mlbb" target="_blank" rel="noopener noreferrer" class="github-badge fade-in" id="github-badge">
        <svg class="github-icon" viewBox="0 0 16 16" fill="currentColor" width="16" height="16">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        <span class="github-text">cabrata/check-id-mlbb</span>
        <span class="github-divider"></span>
        <svg class="star-icon" viewBox="0 0 16 16" fill="currentColor" width="13" height="13">
          <path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/>
        </svg>
        <span class="github-stars" id="github-stars">–</span>
      </a>

      <!-- Header -->
      <div class="header fade-in" id="header">
        <div class="logo-glow">
          <img src="./img/logo-ml.webp" alt="Mobile Legends Logo" class="logo-img">
        </div>
        <!-- Decorative rule -->
        <div class="decorative-rule">
          <div class="decorative-diamond"></div>
        </div>
        <h1 class="title" data-i18n="title">Cek ID Akun <span class="title-accent">Mobile Legends</span></h1>
        <p class="subtitle" data-i18n="subtitle">Verifikasi username dan region akun Mobile Legends secara instan</p>
      </div>

      <!-- Card -->
      <div class="fade-in fade-in-delay" id="card-container">
        <div class="glass-card">
          <!-- Inner border ornament -->
          <div class="card-inner-border"></div>

          <!-- Card Header -->
          <div class="card-header">
            <div class="card-header-icon">
              <i data-lucide="search" class="icon-sm"></i>
            </div>
            <div>
              <h2 class="card-title" data-i18n="cardTitle">Validasi Akun</h2>
              <p class="card-desc" data-i18n="cardDesc">Masukkan User ID dan Server ID akun Anda</p>
            </div>
          </div>

          <!-- Header divider -->
          <div class="card-header-divider"></div>

          <!-- Form -->
          <div class="card-body">
            <form id="validation-form" class="form-grid">
              <div class="input-group">
                <label for="gameId" class="input-label">
                  <i data-lucide="hash" class="icon-xs"></i>
                  <span data-i18n="labelUserId">User ID</span>
                </label>
                <input type="number"
                  id="gameId"
                  data-i18n-placeholder="placeholderUserId"
                  placeholder="Contoh: 496332516" autocomplete="off"
                  class="input-field"
                />
              </div>

              <div class="input-group">
                <label for="serverId" class="input-label">
                  <i data-lucide="server" class="icon-xs"></i>
                  <span data-i18n="labelServerId">Server ID</span>
                </label>
                <input type="number"
                  id="serverId"
                  data-i18n-placeholder="placeholderServerId"
                  placeholder="Contoh: 2463" autocomplete="off"
                  class="input-field"
                />
              </div>

              <button
                type="submit"
                id="submit-button"
                class="submit-btn"
              >
                <i data-lucide="search" class="icon-sm"></i>
                <span data-i18n="btnSubmit">Cek Sekarang</span>
              </button>
            </form>

            <!-- Error -->
            <div id="error-container" class="alert alert-error hidden">
              <div class="alert-inner">
                <i data-lucide="alert-circle" class="icon-sm"></i>
                <p id="error-message"></p>
              </div>
            </div>

            <!-- Result -->
            <div id="result-container" class="result-card hidden">
              <div class="result-header">
                <i data-lucide="check-circle-2" class="icon-sm text-emerald"></i>
                <h3 class="result-title" data-i18n="resultFound">Akun Ditemukan!</h3>
              </div>

              <div class="result-grid">
                <div class="result-item">
                  <div class="result-icon-wrap">
                    <i data-lucide="user" class="icon-sm"></i>
                  </div>
                  <div>
                    <p class="result-label">Nickname</p>
                    <p class="result-value" id="result-nickname"></p>
                  </div>
                </div>

                <div class="result-item">
                  <div class="result-icon-wrap">
                    <i data-lucide="globe" class="icon-sm"></i>
                  </div>
                  <div>
                    <p class="result-label">Country</p>
                    <p class="result-value" id="result-country"></p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Footer -->
          <div class="card-footer">
            <p class="footer-text">
              © <span id="current-year"></span> <a href="//caliph.dev" class="footer-link">@caliphdev</a> · <span data-i18n="footer">Built with ❤️</span>
            </p>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="./js/script.js"></script>
</body>
</html>
